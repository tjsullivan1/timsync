apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: timstapaper
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            env: dev
    - clusters:
        selector:
          matchLabels:
            env: prod
  template:
    metadata:
      name: '{{.name}}-timstapaper'
    spec:
      project: default
      source:
        repoURL: https://github.com/tjsullivan1/timsync.git
        targetRevision: HEAD
        path: apps/timstapaper/overlays/{{.metadata.labels.env}}
      destination:
        server: '{{.server}}'
        namespace: argocd
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.data[].remoteRef.conversionStrategy
            - .spec.data[].remoteRef.decodingStrategy
            - .spec.data[].remoteRef.metadataPolicy
            - .spec.target.deletionPolicy
            - .spec.target.template.engineVersion
            - .spec.target.template.mergePolicy
        - group: external-secrets.io
          kind: ExternalSecret
          jsonPointers:
            - /metadata/annotations/force-sync
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jqPathExpressions:
            - .spec.rules[].backendRefs[].group
            - .spec.rules[].backendRefs[].kind
            - .spec.rules[].backendRefs[].weight
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
