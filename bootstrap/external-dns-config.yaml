apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-dns-config
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            env: dev
    - clusters:
        selector:
          matchLabels:
            env: prod
  template:
    metadata:
      name: '{{.name}}-external-dns-config'
    spec:
      project: default
      source:
        repoURL: https://github.com/tjsullivan1/timsync.git
        targetRevision: HEAD
        path: infrastructure/external-dns/overlays/{{.metadata.labels.env}}
      destination:
        server: '{{.server}}'
        namespace: external-dns
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
